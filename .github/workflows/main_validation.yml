name: Main Branch Validation

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: python -m pytest

      - name: Create .env for CI
        run: |
          echo "AIRFLOW_SECRET_KEY=ci-secret-key-not-for-production" >> .env
          echo "AIRFLOW_JWT_SECRET=ci-jwt-secret-not-for-production" >> .env
          echo "POSTGRES_USER=airflow" >> .env
          echo "POSTGRES_PASSWORD=airflow" >> .env
          echo "POSTGRES_DB=airflow" >> .env

      - name: Prepare logs directory with correct permissions
        run: |
          mkdir -p airflow/logs
          chmod -R 777 airflow/logs
          chmod 666 airflow/config/simple_auth_manager_passwords.json

      - name: Prepare data directories with permissive permissions
        run: |
          mkdir -p data/raw data/staging data/core data/analytics
          chmod -R 777 data

      - name: Build and launch full stack
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          sleep 30
          docker compose ps

          echo "Waiting for webserver API to respond..."
          for i in $(seq 1 20); do
            if docker exec flowforge-scheduler curl -sf http://flowforge-webserver:8080/api/v2/monitor/health > /dev/null 2>&1; then
              echo "Webserver is responding."
              break
            fi
            sleep 5
          done

      - name: Confirm all containers are running
        run: |
          docker exec flowforge-scheduler airflow dags list-import-errors

      - name: Show dag-processor logs for debugging
        run: docker logs flowforge-dag-processor --tail 50

      - name: Show webserver status and logs for debugging
        run: |
          docker compose ps
          echo "--- webserver logs ---"
          docker logs flowforge-webserver --tail 50

      - name: Trigger full pipeline (ingestion -> staging -> core -> analytics)
        run: |
          docker exec flowforge-scheduler airflow dags unpause ingestion_dag
          docker exec flowforge-scheduler airflow dags unpause staging_dag
          docker exec flowforge-scheduler airflow dags unpause core_dag
          docker exec flowforge-scheduler airflow dags unpause analytics_dag

          echo "Waiting for all DAGs to register..."
          for i in $(seq 1 20); do
            REGISTERED=$(docker exec flowforge-scheduler airflow dags list)
            if echo "$REGISTERED" | grep -q ingestion_dag && echo "$REGISTERED" | grep -q staging_dag && echo "$REGISTERED" | grep -q core_dag && echo "$REGISTERED" | grep -q analytics_dag; then
              echo "All DAGs registered."
              break
            fi
            sleep 5
          done

          LOGICAL_DATE=$(date -u -d '1 hour ago' +"%Y-%m-%dT%H:%M:%S+00:00")
          echo "Using shared logical date: $LOGICAL_DATE"
          echo "$LOGICAL_DATE" > /tmp/logical_date.txt

          wait_for_dag() {
            DAG_ID=$1
            echo "Waiting for $DAG_ID to finish..."
            for i in $(seq 1 240); do
              STATE=$(docker exec flowforge-scheduler airflow dags state "$DAG_ID" "$LOGICAL_DATE" 2>/dev/null || echo "unknown")
              echo "  $DAG_ID state: $STATE"
              if [ "$STATE" = "success" ]; then
                return 0
              fi
              if [ "$STATE" = "failed" ]; then
                echo "ERROR: $DAG_ID failed."
                exit 1
              fi
              sleep 10
            done
            echo "ERROR: $DAG_ID did not finish within timeout."
            exit 1
          }

          docker exec flowforge-scheduler airflow dags trigger ingestion_dag --logical-date "$LOGICAL_DATE"
          wait_for_dag ingestion_dag

          docker exec flowforge-scheduler airflow dags trigger staging_dag --logical-date "$LOGICAL_DATE"
          wait_for_dag staging_dag

          docker exec flowforge-scheduler airflow dags trigger core_dag --logical-date "$LOGICAL_DATE"
          wait_for_dag core_dag

          docker exec flowforge-scheduler airflow dags trigger analytics_dag --logical-date "$LOGICAL_DATE"
          wait_for_dag analytics_dag

      - name: Show staging_dag task states for debugging
        if: always()
        run: |
          LOGICAL_DATE=$(cat /tmp/logical_date.txt)
          docker exec flowforge-scheduler airflow tasks states-for-dag-run staging_dag "$LOGICAL_DATE" || true

      - name: Show scheduler logs for staging_dag stall
        if: always()
        run: docker logs flowforge-scheduler --tail 150

      - name: Show ingestion_dag task states for debugging
        if: always()
        run: |
          LOGICAL_DATE=$(cat /tmp/logical_date.txt)
          docker exec flowforge-scheduler airflow tasks states-for-dag-run ingestion_dag "$LOGICAL_DATE" || true

      - name: Show analytics_dag task states for debugging
        if: always()
        run: |
          LOGICAL_DATE=$(cat /tmp/logical_date.txt)
          docker exec flowforge-scheduler airflow tasks states-for-dag-run analytics_dag "$LOGICAL_DATE" || true

      - name: Show scheduler logs around failures
        if: always()
        run: docker logs flowforge-scheduler --tail 100


      - name: Verify final analytics outputs exist
        run: |
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/sales_performance.parquet
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/customer_lifetime_value.parquet
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/seller_performance.parquet
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/product_performance.parquet
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/customer_retention.parquet
          docker exec flowforge-scheduler test -f /opt/airflow/data/analytics/analytics_quality_report.json

      - name: Tear down stack
        if: always()
        run: docker compose down -v