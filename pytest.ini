[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
    -v

markers =
    unit: Unit tests - pure logic, no I/O, no Docker
    integration: Integration tests - layer-to-layer data flow
    e2e: End-to-end tests - live Airflow stack required