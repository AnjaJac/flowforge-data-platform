services:
  postgres:
    image: postgres:16
    container_name: flowforge-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowforge-network
  airflow-init:
    image: flowforge-airflow:dev
    container_name: flowforge-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@flowforge-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
      AIRFLOW__API__SECRET_KEY: "7v7dg-LqvjFw6MqTPwoCWbV_eqAVCBh-RCPNhs_lIlE"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
      AIRFLOW__API_AUTH__JWT_SECRET: "UZkiyrnfTm1HQDOJ560dCtlKgEJz-AKInCWiydCi-x4"
    depends_on:
      - postgres
    volumes:
      - ./airflow/config/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
    networks:
      - flowforge-network
    command: airflow db migrate
  airflow-webserver:
    image: flowforge-airflow:dev
    container_name: flowforge-webserver
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@flowforge-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://flowforge-webserver:8080/execution/
      AIRFLOW__API__SECRET_KEY: "7v7dg-LqvjFw6MqTPwoCWbV_eqAVCBh-RCPNhs_lIlE"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
      AIRFLOW__API_AUTH__JWT_SECRET: "UZkiyrnfTm1HQDOJ560dCtlKgEJz-AKInCWiydCi-x4"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./airflow/config/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
    networks:
      - flowforge-network
    command: airflow api-server
  airflow-scheduler:
    image: flowforge-airflow:dev
    container_name: flowforge-scheduler
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@flowforge-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://flowforge-webserver:8080/execution/
      AIRFLOW__API__SECRET_KEY: "7v7dg-LqvjFw6MqTPwoCWbV_eqAVCBh-RCPNhs_lIlE"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
      AIRFLOW__API_AUTH__JWT_SECRET: "UZkiyrnfTm1HQDOJ560dCtlKgEJz-AKInCWiydCi-x4"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./airflow/config/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
    networks:
      - flowforge-network
    command: airflow scheduler
  airflow-dag-processor:
    image: flowforge-airflow:dev
    container_name: flowforge-dag-processor
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@flowforge-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://flowforge-webserver:8080/execution/
      AIRFLOW__API__SECRET_KEY: "7v7dg-LqvjFw6MqTPwoCWbV_eqAVCBh-RCPNhs_lIlE"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
      AIRFLOW__API_AUTH__JWT_SECRET: "UZkiyrnfTm1HQDOJ560dCtlKgEJz-AKInCWiydCi-x4"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./airflow/config/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
    networks:
      - flowforge-network
    command: airflow dag-processor
volumes:
  postgres_data: 
networks:
  flowforge-network:
    name: flowforge-network
    driver: bridge